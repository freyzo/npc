workflow:
  name: publish-npc-agent
  version: 1.0.0
  shape: skeleton_phases
  created: 2026-06-16
  description: >
    Ship npc-agent as a usable npm package + Chrome extension.
    After execution: `npm i -g npc-agent` works, extension loads from
    included folder, any MCP IDE can control the browser.

  # --- Who picks this up ---
  handoff_instructions:
    audience: claude-agent-or-developer
    context: >
      NPC is a browser automation MCP server. It bridges any IDE (VSCode, Cursor)
      to a real Chrome/Brave browser via a Chrome extension + WebSocket relay + CDP.
      The codebase is DONE and builds clean. This workflow covers the packaging,
      hardening, and publishing steps to make it a real distributable tool.
    repo: /Users/freyzo/Desktop/npc
    current_state:
      build: passes (npx tsc --noEmit clean)
      src_files: [src/index.ts, src/relay.ts, src/cdp.ts, src/mcp.ts]
      extension_files: [extension/background.js, extension/manifest.json, extension/offscreen.html, extension/offscreen.js, extension/icons/*]
      entry: dist/index.js (has shebang #!/usr/bin/env node)
      package_name: npc-agent
      port: 7221
      mcp_tools: [npc_screenshot, npc_navigate, npc_click, npc_type, npc_press_key, npc_scroll, npc_find, npc_batch, npc_evaluate, npc_extract_text, npc_extract_html, npc_current_url, npc_page_title]
    owner_npm_account: freyzo
    owner_github: freyzo/npc

  execution_order:
    - phase_1_package_hardening
    - phase_2_extension_polish
    - phase_3_cli_ux
    - phase_4_test_validation
    - phase_5_npm_publish
    - phase_6_github_release

# =============================================================================
phases:

  # ---------------------------------------------------------------------------
  - id: phase_1_package_hardening
    name: Package metadata and npm hygiene
    why: npm publish will fail or produce a broken package without these
    steps:

      - id: p1_s1_package_json
        action: edit package.json
        file: package.json
        changes:
          - field: version
            value: "1.0.0"
          - field: author
            value: "Freya Zou <suzyzou34@gmail.com> (https://freyazou.com)"
          - field: license
            value: "MIT"
          - field: repository
            value: { type: git, url: "https://github.com/freyzo/npc.git" }
          - field: homepage
            value: "https://github.com/freyzo/npc#readme"
          - field: bugs
            value: { url: "https://github.com/freyzo/npc/issues" }
          - field: keywords
            value: [mcp, browser-automation, chrome-extension, cdp, devtools, cursor, vscode, npc]
          - field: files
            value: [dist/, extension/, README.md, LICENSE]
            why: >
              controls what goes into the npm tarball. dist/ = compiled JS,
              extension/ = chrome extension users load unpacked.
              node_modules, src/, .cursor/, plans/ excluded automatically.
          - field: scripts.prepublishOnly
            value: "npm run build"
            why: ensures dist/ is fresh before every publish
        verification: |
          cd /Users/freyzo/Desktop/npc
          node -e "const p=require('./package.json'); console.log(p.name, p.version, p.files)"

      - id: p1_s2_license
        action: create LICENSE file
        file: LICENSE
        content: MIT license, year 2026, name "Freya Zou"
        cmd: |
          cat > LICENSE << 'EOF'
          MIT License

          Copyright (c) 2026 Freya Zou

          Permission is hereby granted, free of charge, to any person obtaining a copy
          of this software and associated documentation files (the "Software"), to deal
          in the Software without restriction, including without limitation the rights
          to use, copy, modify, merge, publish, distribute, sublicense, and/or sell
          copies of the Software, and to permit persons to whom the Software is
          furnished to do so, subject to the following conditions:

          The above copyright notice and this permission notice shall be included in all
          copies or substantial portions of the Software.

          THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR
          IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,
          FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE
          AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER
          LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,
          OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE
          SOFTWARE.
          EOF

      - id: p1_s3_npmignore
        action: create .npmignore
        file: .npmignore
        why: >
          even with files[] in package.json, .npmignore is a safety net
          and signals intent to future maintainers
        content: |
          src/
          .cursor/
          plans/
          doc/
          *.excalidraw
          .gitignore
          .DS_Store
          tsconfig.json
          .env*
        verification: |
          cd /Users/freyzo/Desktop/npc
          npm pack --dry-run 2>&1 | head -40
          # should show: dist/*, extension/*, README.md, LICENSE, package.json
          # should NOT show: src/*, plans/*, .cursor/*, tsconfig.json

      - id: p1_s4_gitignore_update
        action: update .gitignore
        file: .gitignore
        changes:
          - remove: "screenshot.png" and "fb-*.png" lines (files already deleted)
          - add: "*.tgz" (npm pack output)
        final_content: |
          node_modules/
          dist/
          .env
          .env.*
          .DS_Store
          *.tgz

  # ---------------------------------------------------------------------------
  - id: phase_2_extension_polish
    name: Chrome extension ready for distribution
    why: >
      extension ships inside the npm package (extension/ folder).
      users load unpacked. needs to be self-contained and clear.
    steps:

      - id: p2_s1_extension_readme
        action: create extension/README.md
        file: extension/README.md
        content: |
          # NPC Chrome Extension

          ## Install

          1. Open `chrome://extensions` (or `brave://extensions`)
          2. Enable **Developer mode** (top right toggle)
          3. Click **Load unpacked**
          4. Select THIS folder (`extension/`)
          5. Click the NPC icon on any tab - green badge = connected

          ## How it works

          The extension connects to the NPC relay server via WebSocket (localhost:7221).
          It uses chrome.debugger (CDP) to control browser tabs on behalf of your IDE.

          ## Troubleshooting

          - Red `!` badge: relay server not running. Start NPC from your IDE or run `node dist/index.js`
          - Gray icon: click the NPC icon on the tab you want to control
          - Green `1` badge: connected and ready

      - id: p2_s2_extension_version_sync
        action: ensure extension/manifest.json version matches package.json
        rule: both must be "1.0.0"
        file: extension/manifest.json
        change: version field from "0.1.0" to "1.0.0"

  # ---------------------------------------------------------------------------
  - id: phase_3_cli_ux
    name: CLI entry point polish
    why: >
      when user runs `npc` after global install, it should give useful output.
      currently it boots MCP server on stdio which hangs if run directly in terminal.
    steps:

      - id: p3_s1_help_flag
        action: add --help flag to src/index.ts
        file: src/index.ts
        logic: |
          if process.argv includes '--help' or '-h':
            print usage to stderr:
              "NPC - Your browser's NPC. Handles the side quests.

              Usage:
                As MCP server (IDE connects via stdio):
                  node dist/index.js

                Relay-only mode (extension bridge without MCP):
                  node dist/index.js --relay-only

                Show this help:
                  node dist/index.js --help

              Configure your IDE:
                Add to .cursor/mcp.json or .vscode/mcp.json:
                {
                  \"mcpServers\": {
                    \"npc\": {
                      \"command\": \"npc\",
                      \"args\": []
                    }
                  }
                }

              Relay port: 7221 (WebSocket for Chrome extension)
              Docs: https://github.com/freyzo/npc"
            process.exit(0)
        where: before relay construction (top of file, after imports + PORT const)

      - id: p3_s2_version_flag
        action: add --version flag
        file: src/index.ts
        logic: |
          if process.argv includes '--version' or '-v':
            read version from package.json via createRequire or hardcode
            print to stdout: "npc-agent 1.0.0"
            process.exit(0)
        where: right after --help check

      - id: p3_s3_env_port_override
        action: allow NPC_PORT env var to override default port
        file: src/index.ts
        change: |
          const PORT = parseInt(process.env.NPC_PORT || '7221', 10)
        also_update: src/relay.ts constructor default stays 7221 (fallback)
        why: some users may have port 7221 in use

      - id: p3_s4_bin_path
        action: verify global install bin works
        verification: |
          cd /Users/freyzo/Desktop/npc
          npm run build
          npm link
          which npc          # should print a path
          npc --help          # should print usage
          npc --version       # should print 1.0.0
          npm unlink -g npc-agent   # cleanup

  # ---------------------------------------------------------------------------
  - id: phase_4_test_validation
    name: Smoke test the full pipeline
    why: catch broken imports, missing files, runtime errors before publish
    steps:

      - id: p4_s1_clean_build
        cmd: |
          cd /Users/freyzo/Desktop/npc
          rm -rf dist/
          npm run build
          # must exit 0 with no errors

      - id: p4_s2_dry_run_pack
        cmd: |
          cd /Users/freyzo/Desktop/npc
          npm pack --dry-run 2>&1
        verification: |
          output must include:
            - dist/index.js, dist/relay.js, dist/cdp.js, dist/mcp.js
            - dist/*.d.ts (type declarations)
            - extension/background.js, extension/manifest.json
            - extension/offscreen.html, extension/offscreen.js
            - extension/icons/icon16.png, icon48.png, icon128.png
            - README.md, LICENSE, package.json
          output must NOT include:
            - src/*.ts (source files)
            - .cursor/ (IDE config)
            - plans/ (internal docs)
            - node_modules/
            - tsconfig.json

      - id: p4_s3_import_test
        cmd: |
          cd /Users/freyzo/Desktop/npc
          node -e "import('./dist/index.js').catch(e => { console.error(e.message); process.exit(1) })"
        why: catches ESM resolution failures, missing deps
        note: will start the server briefly - that's fine, ctrl-c or it'll exit

      - id: p4_s4_extension_load_test
        action: manual verification
        steps:
          - open brave://extensions
          - click "Load unpacked" -> select extension/ folder
          - verify icon appears, no errors in extension console
          - click icon on a tab -> badge turns green
          - check brave://extensions for "Errors" link (should be none)

      - id: p4_s5_mcp_integration_test
        action: manual verification
        steps:
          - ensure .cursor/mcp.json points to dist/index.js
          - reload Cursor (Cmd+Shift+P -> "Reload Window")
          - open Cursor chat, ask "take a screenshot"
          - verify NPC tools appear and screenshot returns an image
          - test npc_find with a known element
          - test npc_batch with [click, type, key] sequence

  # ---------------------------------------------------------------------------
  - id: phase_5_npm_publish
    name: Publish to npm registry
    why: makes `npm i -g npc-agent` work for anyone
    steps:

      - id: p5_s1_npm_login
        cmd: npm login
        note: >
          user must do this manually. needs npm account "freyzo".
          if 2FA enabled, have authenticator ready.

      - id: p5_s2_final_build
        cmd: |
          cd /Users/freyzo/Desktop/npc
          rm -rf dist/
          npm run build

      - id: p5_s3_publish
        cmd: |
          cd /Users/freyzo/Desktop/npc
          npm publish --access public
        verification: |
          npm info npc-agent version  # should return 1.0.0
          # wait 1-2 min for registry propagation

      - id: p5_s4_global_install_test
        cmd: |
          npm i -g npc-agent
          npc --help
          npc --version
        verification: both commands produce correct output

  # ---------------------------------------------------------------------------
  - id: phase_6_github_release
    name: Push to GitHub and tag release
    why: source available, users can file issues, README renders on GitHub
    steps:

      - id: p6_s1_git_init_or_verify
        cmd: |
          cd /Users/freyzo/Desktop/npc
          git status 2>/dev/null || git init
          git remote get-url origin 2>/dev/null || git remote add origin git@github.com:freyzo/npc.git

      - id: p6_s2_commit
        cmd: |
          cd /Users/freyzo/Desktop/npc
          git add -A
          git commit -m "v1.0.0 - initial release

          MCP server for browser automation via Chrome extension + CDP.
          13 tools: screenshot, navigate, click, type, find, batch, evaluate, etc.
          Works with any MCP IDE (VSCode, Cursor, Windsurf)."

      - id: p6_s3_tag
        cmd: |
          cd /Users/freyzo/Desktop/npc
          git tag -a v1.0.0 -m "v1.0.0"

      - id: p6_s4_push
        cmd: |
          cd /Users/freyzo/Desktop/npc
          git push -u origin main
          git push origin v1.0.0

      - id: p6_s5_github_release
        action: create GitHub release
        method: gh CLI or GitHub web UI
        cmd: |
          cd /Users/freyzo/Desktop/npc
          gh release create v1.0.0 \
            --title "v1.0.0 - Your browser's NPC" \
            --notes "Initial release. Install: \`npm i -g npc-agent\`

          ## What's in the box
          - MCP server (stdio transport) for any IDE
          - Chrome/Brave extension (load unpacked)
          - 13 browser automation tools including batch actions and semantic element finding
          - WebSocket relay on port 7221

          ## Quick start
          1. \`npm i -g npc-agent\`
          2. Load \`extension/\` in Chrome/Brave
          3. Add NPC to your IDE's MCP config
          4. Start automating"
        fallback: if gh not installed, create release manually on github.com

# =============================================================================
gotchas:

  - id: G01
    issue: dist/ is in .gitignore but needed in npm tarball
    fix: >
      files[] in package.json explicitly includes dist/.
      npm publish reads files[] and ignores .gitignore for tarball contents.
      git still ignores dist/ (correct - don't commit compiled JS).

  - id: G02
    issue: shebang (#!/usr/bin/env node) must be first line of dist/index.js
    fix: >
      src/index.ts already has shebang. TypeScript preserves it during compilation.
      Verify after build: head -1 dist/index.js

  - id: G03
    issue: ESM + global install bin can fail on some Node versions
    fix: >
      package.json has "type": "module". The bin entry points to dist/index.js
      which uses ESM imports. Node >= 18 handles this. engines field enforces it.

  - id: G04
    issue: extension/ ships in npm but user must manually load unpacked
    fix: >
      README and extension/README.md both have clear load-unpacked instructions.
      Future: Chrome Web Store listing eliminates this step.

  - id: G05
    issue: port 7221 conflict
    fix: >
      NPC_PORT env var override added in phase_3. Both src/index.ts and
      extension/background.js must agree on port. Extension is hardcoded to 7221.
      For custom port, user must also edit extension/background.js line 1.
      Document this in README.

  - id: G06
    issue: npm publish requires npm login + possibly 2FA
    fix: user must handle auth manually. cannot be automated by agent.

  - id: G07
    issue: package name "npc-agent" might be taken
    fix: >
      check first: npm info npc-agent.
      if taken, fallback options: @freyzo/npc, npc-browser, npc-mcp.
      scoped (@freyzo/npc) always available but changes install command.

config:
  npm_package_name: npc-agent
  npm_scope_fallback: "@freyzo/npc"
  version: "1.0.0"
  relay_port: 7221
  github_repo: freyzo/npc
  github_remote: "git@github.com:freyzo/npc.git"
  node_minimum: "18.0.0"
  license: MIT
